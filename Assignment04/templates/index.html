<!-- templates/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spam or Ham - Simple</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    textarea { width: 100%; height: 140px; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 12px; margin-top: 8px; }
    .container { max-width: 760px; margin: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Spam or Ham Classifier</h1>
    <form action="/score" method="post">
      <label for="text">Enter message:</label><br>
      <textarea id="text" name="Text" placeholder="Type message here..."></textarea><br>
      <button type="submit">Predict</button>
    </form>
  </div>
</body>
</html>
