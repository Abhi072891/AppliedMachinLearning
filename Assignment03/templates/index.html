<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spam or Ham - Simple</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    .container { max-width: 700px; margin: 0 auto; }
    textarea { width: 100%; height: 140px; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 16px; font-size: 16px; }
    h1 { margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Spam or Ham Classifier</h1>
    <form action="/score" method="post" accept-charset="utf-8">
      <!-- keep the field name "Text" so it matches request.form.get("Text", "") -->
      <label for="text">Enter message:</label><br>
      <textarea id="text" name="text" placeholder="Type message here..."></textarea>
      <div style="margin-top:10px;">
        <button type="submit">Predict</button>
      </div>
    </form>
  </div>
</body>
</html>
