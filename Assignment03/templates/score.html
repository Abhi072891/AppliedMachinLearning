<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Result - Spam or Ham</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    .container { max-width: 700px; margin: 0 auto; }
    .label { font-weight: bold; margin-top: 8px; display:block; }
    textarea { width: 100%; height: 140px; padding: 8px; box-sizing: border-box; }
    a.button { display: inline-block; margin-top: 12px; padding: 8px 12px; text-decoration: none; background:#eee; color:#000; border-radius:4px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Keep element IDs so tests that search for them still work -->
    <h1 id="scoreh1">You entered a {{ pred }}!</h1>
    <p id="scorep"><strong>Score:</strong> {{ prob }}</p>

    <label class="label" for="result">Input text</label>
    <textarea id="result" readonly>{{ text }}</textarea>

    <div>
      <a class="button" href="/">Go back</a>
    </div>
  </div>
</body>
</html>
